<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowli — אבחון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#F6F1E6; --bg-light:#FBF7EE; --cream:#FFFFFF;
      --grey:#2A2A2A; --ink:#1A1A1A; --text:#2A2A2A;
      --orange:#F26B1F; --orange-deep:#D45A12;
      --border:#D8D0BE; --check-blue:#2C7BE5;
    }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Assistant',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased;
      min-height:100vh; position:relative; overflow-x:hidden;
    }
    .wave-svg { position:absolute; pointer-events:none; z-index:0; }
    .wave-svg-top { top:80px; right:0; width:100%; max-width:1400px; height:900px; }
    .wave-svg-bottom { bottom:0; left:0; width:70%; max-width:750px; height:auto; }

    .top-nav {
      position:relative; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:22px 32px 16px; max-width:1400px; margin:0 auto;
    }
    .btn-outline-sm {
      background:rgba(255,255,255,.6);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      border:1.5px solid var(--ink); color:var(--ink);
      border-radius:12px; padding:10px 22px;
      font-family:'Assistant',sans-serif;
      font-size:15px; font-weight:600; cursor:pointer; transition:all .2s;
    }
    .btn-outline-sm:hover { background:var(--ink); color:#fff; }

    .flowli-logo {
      display:inline-flex; align-items:center; gap:0.3em;
      font-size:24px; text-decoration:none; direction:ltr;
    }
    .flowli-logo svg { width:1.1em; height:1.1em; }
    .flowli-logo .logo-text {
      font-family:'Inter',sans-serif; font-weight:800; letter-spacing:-0.035em;
    }
    .flowli-logo .logo-flow { color:#2A2A2A; }
    .flowli-logo .logo-li   { color:var(--orange); }

    .page-wrap {
      position:relative; z-index:5;
      max-width:700px; margin:0 auto; padding:24px 24px 60px;
    }

    .hero { text-align:center; margin-bottom:30px; }
    .hero h1 {
      font-family:'Rubik',sans-serif;
      font-weight:700; font-size:58px; line-height:1.12;
      color:var(--ink); letter-spacing:-0.02em; margin-bottom:24px;
    }
    .hero h1 .accent { color:var(--orange); }
    .hero p {
      font-size:16px; line-height:1.75; color:#2A2A2A;
      max-width:560px; margin:0 auto; font-weight:400;
    }
    .hero p strong { color:var(--ink); font-weight:700; }

    .form-card {
      position:relative;
      background:linear-gradient(to left,
        rgba(221,229,247,.78) 0%,
        rgba(218,236,239,.72) 35%,
        rgba(234,236,229,.70) 68%,
        rgba(246,231,214,.75) 100%);
      backdrop-filter:blur(28px) saturate(1.6);
      -webkit-backdrop-filter:blur(28px) saturate(1.6);
      border:1px solid rgba(255,255,255,.9);
      border-radius:26px; padding:26px 24px 24px;
      box-shadow:
        0 1px 1px rgba(255,255,255,1) inset,
        0 -1px 1px rgba(200,150,100,.18) inset,
        0 30px 50px -18px rgba(180,110,60,.30),
        0 12px 24px -8px rgba(120,80,140,.12),
        0 4px 12px rgba(0,0,0,.05);
      margin:0 auto 36px; max-width:520px;
    }

    .field-group { margin-bottom:14px; }
    .field-label {
      display:block; font-size:14px; font-weight:500; color:#2A2A2A;
      margin-bottom:7px; text-align:right; padding-right:2px;
    }
    .field-input {
      width:100%; padding:15px 18px;
      border:1px solid var(--border); border-radius:14px;
      font-family:'Assistant',sans-serif;
      font-size:15px; color:var(--ink); background:#FFFFFF;
      text-align:center; outline:none;
      transition:border-color .2s, box-shadow .2s;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .field-input::placeholder { color:#9a9a9a; font-weight:400; }
    .field-input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(242,107,31,.13); }
    .field-input[type="tel"], .field-input[type="email"] { direction:ltr; }

    .consent-row {
      display:flex; align-items:center; gap:10px;
      margin:18px 2px 20px; direction:rtl; justify-content:flex-start;
    }
    .consent-row input[type="checkbox"] {
      appearance:none; -webkit-appearance:none;
      width:18px; height:18px; min-width:18px;
      border:2px solid #2A2A2A; border-radius:5px;
      background:#fff; cursor:pointer; position:relative; transition:all .15s;
    }
    .consent-row input[type="checkbox"]:checked { background:#1A1A1A; border-color:#1A1A1A; }
    .consent-row input[type="checkbox"]:checked::after {
      content:''; position:absolute; top:2px; left:5px;
      width:5px; height:9px;
      border:solid #fff; border-width:0 2px 2px 0;
      transform:rotate(45deg);
    }
    .consent-label { font-size:13px; color:#555; line-height:1.5; font-weight:400; }

    .btn-primary {
      width:100%; background:var(--orange); color:#fff;
      border:none; border-radius:14px; padding:17px 24px;
      font-family:'Assistant',sans-serif;
      font-size:17px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow:0 10px 28px rgba(242,107,31,.40);
      transition:all .2s;
    }
    .btn-primary:hover { background:var(--orange-deep); transform:translateY(-1px); box-shadow:0 12px 32px rgba(242,107,31,.50); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { pointer-events:none; opacity:.45; cursor:not-allowed; }
    .btn-arrow { font-size:19px; direction:ltr; font-weight:400; }

    .trust-badges {
      display:flex; align-items:center; justify-content:center;
      gap:56px; padding:8px 0; flex-wrap:wrap;
    }
    .trust-item {
      display:inline-flex; align-items:center; gap:10px;
      font-size:15px; color:#2A2A2A; font-weight:500; direction:rtl;
    }
    .trust-icon { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .trust-icon svg { width:100%; height:100%; stroke:#2A2A2A; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .trust-en { display:none; }

    .bottom-nav { display:none; }
    .home-indicator { display:none; }

    @media (max-width: 600px) {
      body { max-width:430px; margin:0 auto; padding-bottom:90px; background:var(--bg); }
      .wave-svg-top { width:110%; max-width:none; }
      .wave-svg-bottom { width:110%; max-width:none; bottom:90px; }
      .top-nav { padding:16px 20px; }
      .btn-outline-sm { padding:9px 18px; font-size:14px; }
      .flowli-logo { font-size:22px; }
      .page-wrap { padding:14px 22px 30px; }
      .hero { padding:16px 0 0; }
      .hero h1 { font-size:44px; line-height:1.12; margin-bottom:20px; }
      .hero p { font-size:15px; max-width:340px; line-height:1.7; }
      .form-card { padding:22px 20px 20px; border-radius:24px; margin-bottom:28px; }
      .field-input { padding:14px 16px; font-size:15px; }
      .btn-primary { padding:16px 24px; font-size:16px; }
      .trust-badges { flex-direction:column; gap:14px; padding:14px 0 24px; }
      .trust-item { font-size:16px; font-weight:500; color:#1A1A1A; direction:rtl; }
      .trust-he { display:inline; }
      .trust-en { display:none; }
      .bottom-nav {
        position:fixed; bottom:0; left:50%; transform:translateX(-50%);
        width:100%; max-width:430px;
        background:rgba(255,255,255,.94);
        backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
        border-top:1px solid rgba(0,0,0,.05);
        display:flex; padding:10px 0 24px; z-index:100;
      }
      .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; padding:4px 0; text-decoration:none; }
      .nav-icon { width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
      .nav-icon svg { width:100%; height:100%; stroke:#1A1A1A; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
      .nav-label { font-size:12px; font-weight:500; color:#1A1A1A; }
      .nav-item.active .nav-label { color:var(--orange); }
      .nav-item.active .nav-icon svg { stroke:var(--orange); }
      .nav-item.active .nav-icon svg circle:last-of-type { fill:var(--orange); stroke:var(--orange); }
      .home-indicator { position:fixed; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:var(--ink); border-radius:3px; z-index:101; display:block; }
    }
  </style>
</head>
<body>

  <!-- גל עליון -->
  <svg class="wave-svg wave-svg-top" viewBox="0 0 1400 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="waveTopFill" cx="85%" cy="35%" r="75%">
        <stop offset="0%"   stop-color="#FBBA76" stop-opacity="0.85"/>
        <stop offset="25%"  stop-color="#FDC481" stop-opacity="0.70"/>
        <stop offset="50%"  stop-color="#FDC481" stop-opacity="0.45"/>
        <stop offset="75%"  stop-color="#FDC481" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#FDC481" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <path fill="url(#waveTopFill)" d="M 450,0 C 580,70 750,150 900,210 C 1010,260 1110,330 1200,400 C 1280,460 1350,510 1400,540 L 1400,0 Z"/>
  </svg>

  <!-- גל תחתון -->
  <svg class="wave-svg wave-svg-bottom" viewBox="0 0 800 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="waveBottomFill" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#FBBA76" stop-opacity="0.75"/>
        <stop offset="25%"  stop-color="#FDC481" stop-opacity="0.55"/>
        <stop offset="55%"  stop-color="#FDC481" stop-opacity="0.30"/>
        <stop offset="80%"  stop-color="#FDC481" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#FDC481" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path fill="url(#waveBottomFill)" d="M 0,800 L 0,200 C 70,210 150,260 220,330 C 300,410 360,360 440,420 C 530,490 510,580 600,640 C 680,690 740,720 800,750 L 800,800 Z"/>
  </svg>

  <!-- ניווט עליון -->
  <nav class="top-nav">
    <a href="#" class="flowli-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 30 Q25 15 40 30 Q55 45 70 30" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M10 45 Q25 30 40 45 Q55 60 70 45" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M10 60 Q25 45 40 60 Q55 75 70 60" stroke="#F26B1F" stroke-width="6" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">
        <span class="logo-flow">flow</span><span class="logo-li">li</span>
      </span>
    </a>
    <button class="btn-outline-sm" onclick="document.getElementById('fullname').focus()">התחל.י אבחון</button>
  </nav>

  <main class="page-wrap">

    <section class="hero">
      <h1>
        בלי בלאגן.<br>
        בלי לידים שנופלים.<br>
        <span class="accent">בלי טירוף.</span>
      </h1>
      <p>
        בוא.י נסדר את העסק שלך — צעד אחד בכל פעם.
        <strong>אבחון של 5 דקות</strong> יראה לך בדיוק
        מאיפה להתחיל, איזו אוטומציה תעשה לך את ההבדל הכי גדול —
        ואיך זה ייראה אצלך.
      </p>
    </section>

    <div class="form-card">

      <div class="field-group">
        <label class="field-label" for="fullname">שם מלא</label>
        <input class="field-input" id="fullname" type="text" placeholder="ישראל ישראלי" autocomplete="name">
      </div>

      <div class="field-group">
        <label class="field-label" for="email">אימייל</label>
        <input class="field-input" id="email" type="email" placeholder="email@business.co.il" autocomplete="email" inputmode="email">
      </div>

      <div class="field-group">
        <label class="field-label" for="phone">טלפון</label>
        <input class="field-input" id="phone" type="tel" placeholder="050-1234567" autocomplete="tel" inputmode="tel">
      </div>

      <div class="consent-row">
        <input type="checkbox" id="consent">
        <label class="consent-label" for="consent">
          אני מאשר.ת קבלת תכנים מקצועיים ועדכונים מ-Flowli במייל
          ומסכימ.ה ל<a href="#" onclick="flowliOpenModal('flowli-privacy-modal');return false;" style="color:var(--orange);text-decoration:underline;">מדיניות הפרטיות</a>
        </label>
      </div>

      <button class="btn-primary" type="button" id="btnStart" onclick="startFunnel()" disabled>
        התחל.י את האבחון
        <span class="btn-arrow">←</span>
      </button>

    </div>

    <div class="trust-badges">

      <div class="trust-item">
        <span class="trust-icon">
          <svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>
        </span>
        <span class="trust-he">תוצאה תוך 5 דקות</span>
      </div>

      <div class="trust-item">
        <span class="trust-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="12" cy="12" r="1.6" fill="#2A2A2A" stroke="none"/>
          </svg>
        </span>
        <span class="trust-he">מותאם אישית</span>
      </div>

      <div class="trust-item">
        <span class="trust-icon">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </span>
        <span class="trust-he">פרטיות מובטחת</span>
      </div>

    </div>

  </main>

  <nav class="bottom-nav">
    <a class="nav-item" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 21l1.8-5.5A8 8 0 1 1 21 12z"/></svg></span>
      <span class="nav-label">צור קשר</span>
    </a>
    <a class="nav-item active" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6"/></svg></span>
      <span class="nav-label">אבחון</span>
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M3 13h18"/></svg></span>
      <span class="nav-label">שירותים</span>
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>
      <span class="nav-label">בית</span>
    </a>
  </nav>

  <div class="home-indicator"></div>

  <script>
    function updateBtn() {
      const btn = document.getElementById('btnStart');
      btn.disabled = !document.getElementById('consent').checked;
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('consent').addEventListener('change', updateBtn);
    });

    function startFunnel() {
      const name    = document.getElementById('fullname').value.trim();
      const email   = document.getElementById('email').value.trim();
      const phone   = document.getElementById('phone').value.trim();
      const consent = document.getElementById('consent').checked;

      if (!name)  { document.getElementById('fullname').focus(); return; }
      if (!email) { document.getElementById('email').focus(); return; }
      if (!phone) { document.getElementById('phone').focus(); return; }

      if (!consent) return;

      localStorage.setItem('flowli_lead', JSON.stringify({ name, email, phone }));
      window.location.href = 'flowli-avchon-step2-v2.html';
    }
  </script>
  <script src="flowli-legal.js"></script>
</body>
</html>
