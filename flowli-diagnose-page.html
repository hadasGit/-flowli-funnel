<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowli - אבחון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#F6F1E6; --bg-light:#FBF7EE; --cream:#FFFFFF;
      --grey:#2A2A2A; --ink:#1A1A1A; --text:#2A2A2A;
      --orange:#F26B1F; --orange-deep:#D45A12;
      --border:#D8D0BE; --check-blue:#2C7BE5;
    }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Assistant',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased;
      min-height:100vh; position:relative; overflow-x:hidden;
    }
    .wave-svg { position:absolute; pointer-events:none; z-index:0; }
    .wave-svg-top { top:80px; right:0; width:100%; max-width:1400px; height:900px; }
    .wave-svg-bottom { bottom:0; left:0; width:70%; max-width:750px; height:auto; min-height:300px; }

    .top-nav {
      position:relative; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:22px 32px 16px; max-width:1400px; margin:0 auto;
    }
    .btn-outline-sm {
      background:rgba(255,255,255,.6);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      border:1.5px solid var(--ink); color:var(--ink);
      border-radius:12px; padding:10px 22px;
      font-family:'Assistant',sans-serif;
      font-size:15px; font-weight:600; cursor:pointer; transition:all .2s;
    }
    .btn-outline-sm:hover { background:var(--ink); color:#fff; }

    .flowli-logo {
      display:inline-flex; align-items:center; gap:0.3em;
      font-size:clamp(32px, 4vw, 44px); text-decoration:none; direction:ltr;
    }
    .flowli-logo svg { width:1.1em; height:1.1em; }
    .flowli-logo .logo-text {
      font-family:'Inter',sans-serif; font-weight:800; letter-spacing:-0.035em;
    }
    .flowli-logo .logo-flow { color:#2A2A2A; }
    .flowli-logo .logo-li   { color:var(--orange); }

    .page-wrap {
      position:relative; z-index:5;
      max-width:700px; margin:0 auto; padding:24px 24px 60px;
    }

    .hero { text-align:center; margin-bottom:30px; }
    .hero h1 {
      font-family:'Rubik',sans-serif;
      font-weight:700; font-size:58px; line-height:1.12;
      color:var(--ink); letter-spacing:-0.02em; margin-bottom:24px;
      white-space:nowrap;
    }
    .hero h1 .accent { color:var(--orange); }
    .hero p {
      font-size:16px; line-height:1.75; color:#2A2A2A;
      max-width:560px; margin:0 auto; font-weight:400;
    }
    .hero p strong { color:var(--ink); font-weight:700; }

    .pre-form-perks {
      list-style:none; padding:0; margin:22px auto 0;
      display:inline-flex; flex-direction:column; gap:9px;
      max-width:340px; text-align:right; direction:rtl;
    }
    .pre-form-perks li {
      display:flex; align-items:center; gap:10px;
      font-size:14.5px; color:#2A2A2A; font-weight:500;
      line-height:1.4;
    }
    .pre-form-perks .perk-check {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; flex-shrink:0;
      background:var(--orange); color:#fff;
      border-radius:50%; font-size:11px; font-weight:800;
      box-shadow:0 2px 6px rgba(242,107,31,.28);
    }
    @media (max-width: 600px) {
      .pre-form-perks { margin-top:18px; gap:8px; max-width:300px; }
      .pre-form-perks li { font-size:13.5px; }
      .pre-form-perks .perk-check { width:18px; height:18px; font-size:10px; }
    }

    .form-card {
      position:relative;
      background:linear-gradient(to left,
        rgba(221,229,247,.78) 0%,
        rgba(218,236,239,.72) 35%,
        rgba(234,236,229,.70) 68%,
        rgba(246,231,214,.75) 100%);
      backdrop-filter:blur(28px) saturate(1.6);
      -webkit-backdrop-filter:blur(28px) saturate(1.6);
      border:1px solid rgba(255,255,255,.9);
      border-radius:26px; padding:26px 24px 24px;
      box-shadow:
        0 1px 1px rgba(255,255,255,1) inset,
        0 -1px 1px rgba(200,150,100,.18) inset,
        0 30px 50px -18px rgba(180,110,60,.30),
        0 12px 24px -8px rgba(120,80,140,.12),
        0 4px 12px rgba(0,0,0,.05);
      margin:0 auto 36px; max-width:520px;
    }

    .field-group { margin-bottom:14px; }
    .field-label {
      display:block; font-size:14px; font-weight:500; color:#2A2A2A;
      margin-bottom:7px; text-align:right; padding-right:2px;
    }
    .field-input {
      width:100%; padding:15px 18px;
      border:1px solid var(--border); border-radius:14px;
      font-family:'Assistant',sans-serif;
      font-size:15px; color:var(--ink); background:#FFFFFF;
      text-align:center; outline:none;
      transition:border-color .2s, box-shadow .2s;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .field-input::placeholder { color:#9a9a9a; font-weight:400; }
    .field-input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(242,107,31,.13); }
    .field-input[type="tel"], .field-input[type="email"] { direction:ltr; }

    .consent-row {
      display:flex; align-items:center; gap:10px;
      margin:18px 2px 20px; direction:rtl; justify-content:flex-start;
    }
    .consent-row input[type="checkbox"] {
      appearance:none; -webkit-appearance:none;
      width:18px; height:18px; min-width:18px;
      border:2px solid #2A2A2A; border-radius:5px;
      background:#fff; cursor:pointer; position:relative; transition:all .15s;
    }
    .consent-row input[type="checkbox"]:checked { background:#1A1A1A; border-color:#1A1A1A; }
    .consent-row input[type="checkbox"]:checked::after {
      content:''; position:absolute; top:2px; left:5px;
      width:5px; height:9px;
      border:solid #fff; border-width:0 2px 2px 0;
      transform:rotate(45deg);
    }
    .consent-label { font-size:13px; color:#555; line-height:1.5; font-weight:400; }

    .btn-primary {
      width:100%; background:var(--orange); color:#fff;
      border:none; border-radius:14px; padding:17px 24px;
      font-family:'Assistant',sans-serif;
      font-size:17px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow:0 10px 28px rgba(242,107,31,.40);
      transition:all .2s;
    }
    .btn-primary:hover { background:var(--orange-deep); transform:translateY(-1px); box-shadow:0 12px 32px rgba(242,107,31,.50); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { pointer-events:none; opacity:.45; cursor:not-allowed; }
    .btn-arrow { font-size:19px; direction:ltr; font-weight:400; }

    .trust-badges {
      display:flex; align-items:center; justify-content:center;
      gap:56px; padding:8px 0; flex-wrap:wrap;
    }
    .trust-item {
      display:inline-flex; align-items:center; gap:10px;
      font-size:15px; color:#2A2A2A; font-weight:500; direction:rtl;
    }
    .trust-icon { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .trust-icon svg { width:100%; height:100%; stroke:#2A2A2A; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .trust-en { display:none; }

    .bottom-nav { display:none; }
    .home-indicator { display:none; }

    @media (max-width: 600px) {
      body { max-width:430px; margin:0 auto; padding-bottom:90px; background: linear-gradient(to top, #FBBA76 0%, #F6F1E6 35%); }
      .wave-svg-top { width:110%; max-width:none; }
      .wave-svg-bottom { width:110%; max-width:none; bottom:0; }
      .top-nav { padding:16px 20px; }
      .btn-outline-sm { padding:9px 18px; font-size:14px; }
      .flowli-logo { font-size:clamp(32px, 4vw, 44px); }
      .page-wrap { padding:14px 22px 30px; }
      .hero { padding:16px 0 0; }
      .hero h1 { font-size:clamp(28px,8.5vw,44px); line-height:1.15; margin-bottom:20px; white-space:nowrap; }
      .hero p { font-size:15px; max-width:340px; line-height:1.7; }
      .form-card { padding:22px 20px 20px; border-radius:24px; margin-bottom:28px; }
      .field-input { padding:14px 16px; font-size:15px; }
      .btn-primary { padding:16px 24px; font-size:16px; }
      .trust-badges { flex-direction:column; gap:14px; padding:14px 0 24px; }
      .trust-item { font-size:16px; font-weight:500; color:#1A1A1A; direction:rtl; }
      .trust-he { display:inline; }
      .trust-en { display:none; }
      .bottom-nav { display:none !important; }
      .home-indicator { display:none !important; }
    }
  </style>
</head>
<body>

  <!-- גל עליון -->

      <linearGradient id="waveBottomFill" x1="0%" y1="100%" x2="100%" y2="0%">

    <rect x="0" y="750" width="800" height="50" fill="#FBBA76" opacity="1"/>

  <!-- ניווט עליון -->
  <nav class="top-nav">
    <a href="#" class="flowli-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 30 Q25 15 40 30 Q55 45 70 30" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M10 45 Q25 30 40 45 Q55 60 70 45" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M10 60 Q25 45 40 60 Q55 75 70 60" stroke="#F26B1F" stroke-width="6" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">
        <span class="logo-flow">flow</span><span class="logo-li">li</span>
      </span>
    </a>
    <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--orange);letter-spacing:.04em;">האבחון שלך כמעט מוכן</span>
  </nav>

  <main class="page-wrap">

    <section class="hero">
      <h1>
        האבחון שלך
        <span class="accent">כמעט מוכן</span>
      </h1>
      <p>
        עוד רגע נציג את <strong>התוצאות האישיות שלך</strong>.<br>
        השאירי פרטים כדי לשמור את האבחון ולקבל עותק למייל.
      </p>
      <ul class="pre-form-perks">
        <li><span class="perk-check">✓</span> האבחון נשמר עבורך</li>
        <li><span class="perk-check">✓</span> עותק יישלח למייל</li>
        <li><span class="perk-check">✓</span> ללא התחייבות</li>
      </ul>
    </section>

    <div class="form-card">

      <div class="field-group">
        <label class="field-label" for="fullname">שם מלא</label>
        <input class="field-input" id="fullname" type="text" placeholder="ישראל ישראלי" autocomplete="name">
      </div>

      <div class="field-group">
        <label class="field-label" for="email">אימייל</label>
        <input class="field-input" id="email" type="email" placeholder="email@business.co.il" autocomplete="email" inputmode="email">
      </div>

      <div class="field-group">
        <label class="field-label" for="phone">טלפון</label>
        <input class="field-input" id="phone" type="tel" placeholder="050-1234567" autocomplete="tel" inputmode="tel">
      </div>

      <div class="consent-row" id="consent_anchor">
        <input type="checkbox" id="consent">
        <label class="consent-label" for="consent">
          אני מאשר.ת קבלת תכנים מקצועיים ועדכונים מ-Flowli במייל
          ומסכימ.ה ל<a href="#" onclick="flowliOpenModal('flowli-privacy-modal');return false;" style="color:var(--orange);text-decoration:underline;">מדיניות הפרטיות</a>
        </label>
      </div>

      <button class="btn-primary" type="button" id="btnStart" onclick="startFunnel()" disabled>
        הצג את התוצאות שלי
        <span class="btn-arrow">←</span>
      </button>

    </div>

    <div class="trust-badges">

      <div class="trust-item">

          <svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>

        <span class="trust-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="12" cy="12" r="1.6" fill="#2A2A2A" stroke="none"/>
          </svg>
        </span>
        <span class="trust-he">מותאם אישית</span>
      </div>

      <div class="trust-item">
        <span class="trust-icon">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>

  <nav class="bottom-nav">

      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 21l1.8-5.5A8 8 0 1 1 21 12z"/></svg></span>
      <span class="nav-label">צור קשר</span>

    <a class="nav-item active" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6"/></svg></span>

    <a class="nav-item" href="#">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>
      <span class="nav-label">בית</span>
    </a>
  </nav>

  <div class="home-indicator"></div>

  <script>
    const SUPABASE_URL = 'https://whuuevjoqitwslnykvgd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXVldmpvcWl0d3NsbnlrdmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTk3NDQsImV4cCI6MjA5NDY5NTc0NH0.r_lxvPFY275H7ODxYGHs0-NvqfQd8_e3fKHYy4sgq34';

    /* סימון שהגיעו למסך 4 - מונע כתיבת abandoned_at_step מהמסך הקודם */
    localStorage.setItem('flowli_reached_lead_form', '1');

    document.addEventListener('DOMContentLoaded', function() {
      /* Pre-fill from URL params (כשמגיעים ממייל עם ?name=...&email=...) */
      const urlParams = new URLSearchParams(window.location.search);
      const urlName  = urlParams.get('name')  || sessionStorage.getItem('flowli_prefill_name');
      const urlEmail = urlParams.get('email') || sessionStorage.getItem('flowli_prefill_email');
      if (urlParams.get('name'))  sessionStorage.setItem('flowli_prefill_name',  urlParams.get('name'));
      if (urlParams.get('email')) sessionStorage.setItem('flowli_prefill_email', urlParams.get('email'));

      /* Pre-fill from localStorage if user is editing details */
      try {
        const u = localStorage.getItem('flowli_user') || localStorage.getItem('flowli_lead');
        if (u) {
          const d = JSON.parse(u);
          if (d.name)  document.getElementById('fullname').value = d.name;
          if (d.email) document.getElementById('email').value = d.email;
          if (d.phone) document.getElementById('phone').value = d.phone;
          /* If editing - assume consent was already given */
          if (d.name && d.email && d.phone) {
            const c = document.getElementById('consent');
            c.checked = true;
            document.getElementById('btnStart').disabled = false;
          }
        }
      } catch(e){}

      /* URL params override localStorage (המייל הוא המקור הסמכותי) */
      if (urlName)  document.getElementById('fullname').value = urlName;
      if (urlEmail) document.getElementById('email').value = urlEmail;
      /* אם שם ומייל מולאו מה-URL - סמן consent אוטומטית */
      if (urlName && urlEmail) {
        document.getElementById('consent').checked = true;
        document.getElementById('btnStart').disabled = false;
      }

      document.getElementById('consent').addEventListener('change', function() {
        document.getElementById('btnStart').disabled = !this.checked;
      });
    });

    async function startFunnel() {
      const name    = document.getElementById('fullname').value.trim();
      const email   = document.getElementById('email').value.trim();
      const phone   = document.getElementById('phone').value.trim();
      const consent = document.getElementById('consent').checked;

      if (!name)    { document.getElementById('fullname').focus(); return; }
      if (!email)   { document.getElementById('email').focus(); return; }
      if (!phone)   { document.getElementById('phone').focus(); return; }
      if (!consent) return;

      /* Persist user info to localStorage (results page reads it) */
      const user = { name, email, phone };
      localStorage.setItem('flowli_lead', JSON.stringify(user));
      localStorage.setItem('flowli_user', JSON.stringify(user));

      /* Merge with existing diagnose data (saved by step1.html) */
      let diagnose = {};
      try { diagnose = JSON.parse(localStorage.getItem('flowli_diagnose') || '{}'); } catch(e) {}
      const payload = Object.assign({}, diagnose, {
        name, email, phone,
        consent: true,
        source: sessionStorage.getItem('flowli_source') || 'flowli-funnel',
        original_email: email,
      });
      localStorage.setItem('flowli_diagnose', JSON.stringify(payload));

      /* Save to Supabase - חדש vs. חוזר */
      try {
        /* בדוק אם המייל כבר קיים */
        const checkRes = await fetch(
          `${SUPABASE_URL}/rest/v1/leads?email=eq.${encodeURIComponent(email)}&select=id,visit_count`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        const existing = await checkRes.json();

        if (existing && existing.length > 0) {
          /* מייל קיים - אפס שדות ועדכן visit_count */
          const visitCount = (existing[0].visit_count || 1) + 1;
          await fetch(`${SUPABASE_URL}/rest/v1/leads?email=eq.${encodeURIComponent(email)}`, {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              name, phone,
              consent: true,
              visit_count: visitCount,
              /* אפס שדות שאלון */
              answers: null,
              score: null,
              worst_area: null,
              roi_estimate: null,
              callback_requested: false,
              meeting_requested: false,
              abandoned_at_step: null,
              completed_at: null,
              source: sessionStorage.getItem('flowli_source') || payload.source
            })
          });
        } else {
          /* מייל חדש - POST */
          await fetch(`${SUPABASE_URL}/rest/v1/leads`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ ...payload, visit_count: 1 })
          });
        }
      } catch(e) {
        console.warn('Supabase save failed:', e);
      }

      localStorage.removeItem('flowli_reached_lead_form');
      /* Continue to results */
      window.location.href = 'flowli-diagnose-results.html';
    }
