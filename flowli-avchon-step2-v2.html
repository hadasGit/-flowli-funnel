<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowli — אבחון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F6F1E6; --bg-light: #FBF7EE; --cream: #FFFFFF;
      --grey: #2A2A2A; --ink: #1A1A1A; --text: #2A2A2A;
      --orange: #F26B1F; --orange-deep: #D45A12;
      --border: #D8D0BE;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Assistant', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; position: relative; overflow-x: hidden;
    }
    .wave-svg { position: absolute; pointer-events: none; z-index: 0; }
    .wave-svg-top  { top: 80px; right: 0; width: 100%; max-width: 1400px; height: 900px; }
    .wave-svg-bottom { bottom: 0; left: 0; width: 70%; max-width: 750px; height: auto; }
    .top-nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px 16px; max-width: 1400px; margin: 0 auto;
    }
    .flowli-logo { display: inline-flex; align-items: center; gap: 0.3em; font-size: 24px; text-decoration: none; direction: ltr; }
    .flowli-logo svg { width: 1.1em; height: 1.1em; }
    .flowli-logo .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: -0.035em; }
    .flowli-logo .logo-flow { color: #2A2A2A; }
    .flowli-logo .logo-li   { color: var(--orange); }
    .nav-step-label { font-family: 'Assistant', sans-serif; font-size: 14px; font-weight: 600; color: #777; }
    .nav-step-label span { color: var(--orange); }
    .page-wrap { position: relative; z-index: 5; max-width: 640px; margin: 0 auto; padding: 20px 24px 80px; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 28px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
    .progress-block-name { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
    .progress-counter { font-size: 12px; font-weight: 500; color: #999; direction: ltr; }
    .progress-track { width: 100%; height: 5px; background: rgba(0,0,0,.09); border-radius: 10px; overflow: hidden; direction: rtl; }
    .progress-fill { height: 100%; border-radius: 10px; background: var(--orange); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

    /* BLOCK HEADER */
    .block-header { margin-bottom: 22px; }
    .block-eyebrow { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
    .block-title { font-family: 'Rubik',sans-serif; font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 4px; }
    .block-sub { font-size: 14px; color: #777; line-height: 1.5; }

    /* QUESTION */
    .question-wrap { margin-bottom: 26px; }
    .question-wrap:last-child { margin-bottom: 0; }
    .q-label { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 11px; line-height: 1.4; letter-spacing: -0.01em; }

    /* OPTION CARDS */
    .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: stretch; }
    .opt-card {
      position: relative; display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 15px; border-radius: 16px;
      background: linear-gradient(to left, rgba(221,229,247,.55) 0%, rgba(218,236,239,.50) 35%, rgba(234,236,229,.48) 68%, rgba(246,231,214,.52) 100%);
      backdrop-filter: blur(20px) saturate(1.5); -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 4px 14px -4px rgba(180,110,60,.12), 0 2px 6px rgba(0,0,0,.04);
      cursor: pointer; transition: all .18s ease; user-select: none;
    }
    .opt-card:hover { border-color: rgba(242,107,31,.4); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 6px 20px -4px rgba(242,107,31,.18), 0 2px 8px rgba(0,0,0,.06); transform: translateY(-1px); }
    .opt-card.selected { border: 1.5px solid var(--orange); background: linear-gradient(to left, rgba(253,221,189,.60) 0%, rgba(254,240,231,.55) 50%, rgba(253,221,189,.50) 100%); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 6px 22px -4px rgba(242,107,31,.22), 0 2px 8px rgba(242,107,31,.10); }
    .opt-radio { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 2px solid rgba(0,0,0,.18); background: rgba(255,255,255,.7); margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .opt-card.selected .opt-radio { border-color: var(--orange); background: var(--orange); }
    .opt-radio-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; }
    .opt-card.selected .opt-radio-dot { opacity: 1; }
    .opt-icon { width: 40px; height: 40px; min-width: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #ffe9e1; flex-shrink: 0; }
    .opt-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .opt-text { flex: 1; min-width: 0; }
    .opt-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.25; margin-bottom: 2px; }
    .opt-desc  { font-size: 12px; font-weight: 400; color: #888; line-height: 1.35; }
    .opt-card.selected .opt-title { color: var(--orange-deep); }
    .opt-card.selected .opt-desc  { color: rgba(212,90,18,.7); }

    /* level tints */
    .opt-card.lvl-0 .opt-icon { background: #e6f4ea; color: #2d7a3a; }
    .opt-card.lvl-1 .opt-icon { background: #fff3e0; color: #b45309; }
    .opt-card.lvl-2 .opt-icon { background: #fce3da; color: #a23f00; }
    .opt-card.lvl-3 .opt-icon { background: #fde8e8; color: #b91c1c; }
    .opt-card.lvl-neutral .opt-icon { background: #ffe9e1; color: #a23f00; }
    .opt-card.lvl-na .opt-icon { background: rgba(0,0,0,.04); color: #999; }

    /* CHIPS */
    .chips-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip {
      padding: 11px 13px; border-radius: 14px;
      background: linear-gradient(to left, rgba(221,229,247,.55), rgba(246,231,214,.52));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.8) inset, 0 2px 6px rgba(0,0,0,.04);
      font-family: 'Assistant',sans-serif; font-size: 13px; font-weight: 600;
      color: var(--grey); cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 7px; user-select: none;
    }
    .chip:hover { border-color: rgba(242,107,31,.4); transform: translateY(-1px); }
    .chip.selected { background: linear-gradient(to left, rgba(253,221,189,.70), rgba(254,240,231,.65)); border: 1.5px solid var(--orange); color: var(--orange-deep); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 4px 14px rgba(242,107,31,.18); }
    .chip-icon { display: flex; align-items: center; }
    .chip-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    /* TEXTAREA */
    .quiz-textarea {
      width: 100%; padding: 14px 16px; border-radius: 16px;
      background: linear-gradient(to left, rgba(221,229,247,.45), rgba(246,231,214,.42));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.8) inset, 0 3px 10px rgba(0,0,0,.04);
      font-family: 'Assistant',sans-serif; font-size: 14px; color: var(--ink);
      resize: none; outline: none; min-height: 80px; transition: border-color .2s, box-shadow .2s; direction: rtl;
    }
    .quiz-textarea::placeholder { color: #aaa; }
    .quiz-textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(242,107,31,.12), 0 1px 1px rgba(255,255,255,.8) inset; }
    .textarea-helper { font-size: 11px; color: #aaa; margin-top: 5px; text-align: right; font-style: italic; }

    /* NAV BUTTONS */
    .quiz-nav { display: flex; gap: 10px; margin-top: 28px; align-items: center; justify-content: space-between; }
    .btn-back {
      flex-shrink: 0; background: rgba(255,255,255,.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--border); color: var(--grey); border-radius: 14px; padding: 14px 22px;
      font-family: 'Assistant',sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,.8); border-color: var(--grey); }
    .btn-back:disabled { opacity: .3; cursor: not-allowed; }
    .btn-next {
      flex: 1; background: var(--orange); color: #fff; border: none; border-radius: 14px; padding: 15px 24px;
      font-family: 'Assistant',sans-serif; font-size: 17px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 10px 28px rgba(242,107,31,.38); transition: all .2s;
    }
    .btn-next:hover { background: var(--orange-deep); transform: translateY(-1px); box-shadow: 0 12px 32px rgba(242,107,31,.48); }
    .btn-next:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-arrow { font-size: 18px; direction: ltr; font-weight: 400; }

    @media (max-width: 600px) {
      .top-nav { padding: 16px 20px; }
      .flowli-logo { font-size: 22px; }
      .page-wrap { padding: 12px 20px 30px; }
      .block-title { font-size: 22px; }
      .opt-card { padding: 10px 11px; gap: 8px; }
      .opt-icon { width: 30px; height: 30px; min-width: 30px; }
      .opt-title { font-size: 13px; }
      .opt-desc  { font-size: 11px; }
      .opt-radio { width: 17px; height: 17px; min-width: 17px; }
    }
  </style>
</head>

  <nav class="top-nav">

      <span class="logo-text"><span class="logo-flow">flow</span><span class="logo-li">li</span></span>
    </a>
    <span class="nav-step-label" id="navStepLabel">שלב <span id="navStepNum">1</span> מתוך 4</span>
  </nav>

  <main class="page-wrap">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-block-name" id="progressBlockName"></span>
        <span class="progress-counter" id="progressCounter">25%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 25%;"></div>
      </div>
    </div>
    <div id="quizContent"></div>
    <div class="quiz-nav">
      <button class="btn-back" id="btnBack" onclick="prevBlock()">חזור</button>
      <button class="btn-next" id="btnNext" onclick="nextBlock()">
        <span id="btnNextLabel">המשך</span>
        <span class="btn-arrow">←</span>
      </button>
    </div>
  </main>

// ─── STATE ───────────────────────────────────────
let currentBlock = 1;
let answers = {};

// ─── RENDER ──────────────────────────────────────
function render() {
  const block = blocks[currentBlock - 1];
  const total = blocks.length;
  const pct = Math.round((currentBlock / total) * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCounter').textContent = pct + '%';
  document.getElementById('progressBlockName').textContent = block.title;
  document.getElementById('navStepNum').textContent = currentBlock;

  document.getElementById('btnBack').disabled = currentBlock === 1;
  const isLast = currentBlock === total;
  document.getElementById('btnNextLabel').textContent = isLast ? 'סיים אבחון' : 'המשך';

  let html = `
    <div class="block-header">
      <div class="block-eyebrow">${block.eyebrow}</div>
      <div class="block-title">${block.title}</div>
      <div class="block-sub">${block.sub}</div>
    </div>`;

  block.questions.forEach(q => {
    html += `<div class="question-wrap"><div class="q-label">${q.label}${q.optional ? ' <span style="font-weight:400;color:#aaa;font-size:13px">(אופציונלי)</span>' : ''}</div>`;

    if (q.type === 'single') {
      html += `<div class="options-list">`;
      q.options.forEach((opt, i) => {
        const sel = answers[q.id] === i ? 'selected' : '';
        html += `
          <div class="opt-card ${opt.lvl} ${sel}" onclick="selectSingle('${q.id}',${i},this)">
            <div class="opt-radio"><div class="opt-radio-dot"></div></div>
            <div class="opt-icon">${svgIcon(opt.icon)}</div>
            <div class="opt-text">
              <div class="opt-title">${opt.title}</div>
              ${opt.desc ? `<div class="opt-desc">${opt.desc}</div>` : ''}
            </div>
          </div>`;
      });
      html += `</div>`;

    } else if (q.type === 'multi') {
      const selected = answers[q.id] || [];
      html += `<div class="chips-wrap">`;
      q.options.forEach((opt, i) => {
        const sel = selected.includes(i) ? 'selected' : '';
        html += `<div class="chip ${sel}" onclick="selectMulti('${q.id}',${i},this)"><span class="chip-icon">${svgIcon(opt.icon)}</span>${opt.title}</div>`;
      });
      html += `</div>`;

    } else if (q.type === 'text') {
      const val = answers[q.id] || '';
      html += `
        <div class="text-area-wrap">
          <textarea class="quiz-textarea" placeholder="${q.placeholder || ''}" oninput="answers['${q.id}']=this.value">${val}</textarea>
          <div class="textarea-helper">ככל שתפרט.י יותר — המפה שלך תהיה מדויקת יותר</div>
        </div>`;
    }
    html += `</div>`;
  });

  document.getElementById('quizContent').innerHTML = html;
  updateNextBtn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSingle(qid, idx, el) {
  answers[qid] = idx;
  el.closest('.options-list').querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
}

function selectMulti(qid, idx, el) {
  if (!answers[qid]) answers[qid] = [];
  const pos = answers[qid].indexOf(idx);
  if (pos === -1) { answers[qid].push(idx); el.classList.add('selected'); }
  else            { answers[qid].splice(pos, 1); el.classList.remove('selected'); }
  updateNextBtn();
}

function updateNextBtn() {
  const block = blocks[currentBlock - 1];
  const allDone = block.questions.every(q => {
    if (q.type === 'text' || q.optional) return true;
    if (q.type === 'multi') return (answers[q.id] || []).length > 0;
    return answers[q.id] !== undefined;
  });
  document.getElementById('btnNext').disabled = !allDone;
}

function nextBlock() {
  if (currentBlock < blocks.length) {
    currentBlock++;
    render();
  } else {
    // שמור תשובות ועבור לעמוד הניתוח
    try {
      localStorage.setItem('flowliAnswers', JSON.stringify(answers));
    } catch(e) {}
    window.location.href = 'flowli-avchon-loading.html';
  }
}

function prevBlock() {
  if (currentBlock > 1) { currentBlock--; render(); }
}

render();
</script>
