<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowli - אבחון עסקי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F6F1E6; --bg-light: #FBF7EE; --cream: #FFFFFF;
      --grey: #2A2A2A; --ink: #1A1A1A; --text: #2A2A2A;
      --orange: #F26B1F; --orange-deep: #D45A12;
      --border: #D8D0BE;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Assistant', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; position: relative; overflow-x: hidden;
      opacity: 0;
      animation: page-fade-in .5s .05s ease-out forwards;
    }
    @keyframes page-fade-in {
      to { opacity: 1; }
    }

    /* ── WAVES ── */
    .wave-svg { position: absolute; pointer-events: none; z-index: 0; }
    .wave-svg-top  { top: 80px; right: 0; width: 100%; max-width: 1400px; height: 900px; }
    .wave-svg-bottom { bottom: 0; left: 0; width: 70%; max-width: 750px; height: auto; }

    /* ── NAV ── */
    .top-nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px 16px; max-width: 1400px; margin: 0 auto;
    }
    .flowli-logo { display: inline-flex; align-items: center; gap: 0.3em; font-size: clamp(26px, 3.5vw, 36px); text-decoration: none; direction: ltr; }
    .flowli-logo svg { width: 1.1em; height: 1.1em; }
    .flowli-logo .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: -0.035em; }
    .flowli-logo .logo-flow { color: #2A2A2A; }
    .flowli-logo .logo-li   { color: var(--orange); }
    .nav-step-label { font-family: 'Assistant', sans-serif; font-size: 14px; font-weight: 600; color: #777; }
    .nav-step-label span { color: var(--orange); }

    /* ── LAYOUT ── */
    .page-wrap { position: relative; z-index: 5; max-width: 700px; margin: 0 auto; padding: 20px 24px 100px; }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 28px; margin-top: 6px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
    .progress-block-name { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
    .progress-counter { font-size: 12px; font-weight: 500; color: #999; direction: ltr; }
    .progress-track { width: 100%; height: 5px; background: rgba(0,0,0,.09); border-radius: 10px; overflow: hidden; direction: rtl; }
    .progress-fill { height: 100%; border-radius: 10px; background: var(--orange); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

    /* ── BLOCK HEADER ── */
    .block-header { margin-bottom: 24px; margin-top: 8px; }
    .block-eyebrow { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
    .block-title { font-family: 'Rubik', sans-serif; font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 6px; }
    .block-sub { font-size: 14px; color: #777; line-height: 1.55; }

    /* ── QUESTION ── */
    .question-wrap { margin-bottom: 28px; }
    .question-wrap:last-child { margin-bottom: 0; }
    .q-label { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 12px; line-height: 1.4; letter-spacing: -0.01em; }

    /* ── OPTION CARDS ── */
    .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: stretch; }
    .options-list.single-col { grid-template-columns: 1fr; }
    .opt-card {
      position: relative; display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 15px; border-radius: 16px;
      background: linear-gradient(to left, rgba(221,229,247,.55) 0%, rgba(218,236,239,.50) 35%, rgba(234,236,229,.48) 68%, rgba(246,231,214,.52) 100%);
      backdrop-filter: blur(20px) saturate(1.5); -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 4px 14px -4px rgba(180,110,60,.12), 0 2px 6px rgba(0,0,0,.04);
      cursor: pointer; transition: all .18s ease; user-select: none;
    }
    .opt-card:hover { border-color: rgba(242,107,31,.4); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 6px 20px -4px rgba(242,107,31,.18), 0 2px 8px rgba(0,0,0,.06); transform: translateY(-1px); }
    .opt-card.selected { border: 1.5px solid var(--orange); background: linear-gradient(to left, rgba(253,221,189,.60) 0%, rgba(254,240,231,.55) 50%, rgba(253,221,189,.50) 100%); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 6px 22px -4px rgba(242,107,31,.22), 0 2px 8px rgba(242,107,31,.10); }
    .opt-radio { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 2px solid rgba(0,0,0,.18); background: rgba(255,255,255,.7); margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .opt-card.selected .opt-radio { border-color: var(--orange); background: var(--orange); }
    .opt-radio-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; }
    .opt-card.selected .opt-radio-dot { opacity: 1; }
    .opt-icon { width: 40px; height: 40px; min-width: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #ffe9e1; flex-shrink: 0; }
    .opt-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .opt-text { flex: 1; min-width: 0; }
    .opt-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.25; margin-bottom: 2px; }
    .opt-desc  { font-size: 12px; font-weight: 400; color: #888; line-height: 1.35; }
    .opt-card.selected .opt-title { color: var(--orange-deep); }
    .opt-card.selected .opt-desc  { color: rgba(212,90,18,.7); }

    /* level tints */
    .opt-card.lvl-0 .opt-icon { background: #e6f4ea; color: #2d7a3a; }
    .opt-card.lvl-1 .opt-icon { background: #fff3e0; color: #b45309; }
    .opt-card.lvl-2 .opt-icon { background: #fce3da; color: #a23f00; }
    .opt-card.lvl-3 .opt-icon { background: #fde8e8; color: #b91c1c; }
    .opt-card.lvl-neutral .opt-icon { background: #ffe9e1; color: #a23f00; }

    /* ── SHORT TEXT INPUT ── */
    .quiz-input {
      width: 100%; padding: 14px 16px; border-radius: 16px;
      background: linear-gradient(to left, rgba(221,229,247,.45), rgba(246,231,214,.42));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.8) inset, 0 3px 10px rgba(0,0,0,.04);
      font-family: 'Assistant', sans-serif; font-size: 15px; color: var(--ink);
      outline: none; transition: border-color .2s, box-shadow .2s; direction: rtl;
    }
    .quiz-input::placeholder { color: #aaa; }
    .quiz-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(242,107,31,.12), 0 1px 1px rgba(255,255,255,.8) inset; }

    /* ── TEXTAREA ── */
    .quiz-textarea {
      width: 100%; padding: 14px 16px; border-radius: 16px;
      background: linear-gradient(to left, rgba(221,229,247,.45), rgba(246,231,214,.42));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.8) inset, 0 3px 10px rgba(0,0,0,.04);
      font-family: 'Assistant', sans-serif; font-size: 14px; color: var(--ink);
      resize: none; outline: none; min-height: 90px; transition: border-color .2s, box-shadow .2s; direction: rtl;
    }
    .quiz-textarea::placeholder { color: #aaa; }
    .quiz-textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(242,107,31,.12), 0 1px 1px rgba(255,255,255,.8) inset; }
    .textarea-helper { font-size: 11px; color: #aaa; margin-top: 5px; text-align: right; font-style: italic; }

    /* ── CHIPS (multi) ── */
    .chips-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip {
      padding: 11px 13px; border-radius: 14px;
      background: linear-gradient(to left, rgba(221,229,247,.55), rgba(246,231,214,.52));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 1px 1px rgba(255,255,255,.8) inset, 0 2px 6px rgba(0,0,0,.04);
      font-family: 'Assistant', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--grey); cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 7px; user-select: none;
    }
    .chip:hover { border-color: rgba(242,107,31,.4); transform: translateY(-1px); }
    .chip.selected { background: linear-gradient(to left, rgba(253,221,189,.70), rgba(254,240,231,.65)); border: 1.5px solid var(--orange); color: var(--orange-deep); box-shadow: 0 1px 1px rgba(255,255,255,.9) inset, 0 4px 14px rgba(242,107,31,.18); }
    .chip-icon { display: flex; align-items: center; }
    .chip-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    /* ── SECTION DIVIDER ── */
    .section-divider { border: none; border-top: 1px solid rgba(0,0,0,.07); margin: 24px 0; }

    /* ── NAV BUTTONS ── */
    .quiz-nav {
      display: flex; gap: 10px; margin-top: 32px; align-items: center; justify-content: space-between;
      position: sticky; bottom: 16px; z-index: 20;
      background: rgba(246,241,230,.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 18px; padding: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
    }
    .btn-back {
      flex-shrink: 0; background: rgba(255,255,255,.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--border); color: var(--grey); border-radius: 12px; padding: 13px 20px;
      font-family: 'Assistant', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,.95); border-color: var(--grey); }
    .btn-back:disabled { opacity: .3; cursor: not-allowed; }
    .btn-next {
      flex: 1; background: var(--orange); color: #fff; border: none; border-radius: 12px; padding: 14px 24px;
      font-family: 'Assistant', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 8px 22px rgba(242,107,31,.38); transition: all .2s;
    }
    .btn-next:hover { background: var(--orange-deep); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(242,107,31,.48); }
    .btn-arrow { font-size: 18px; direction: ltr; font-weight: 400; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .top-nav { padding: 16px 20px; }
      .flowli-logo { font-size: 22px; }
      .page-wrap { padding: 12px 16px 80px; }
      .block-title { font-size: 20px; }
      .options-list { grid-template-columns: 1fr; }
      .opt-card { padding: 10px 12px; gap: 10px; }
      .opt-icon { width: 34px; height: 34px; min-width: 34px; }
      .opt-icon svg { width: 17px; height: 17px; }
      .opt-title { font-size: 13px; }
      .opt-radio { width: 17px; height: 17px; min-width: 17px; }
    }
  </style>
</head>
<body>

  <!-- waves -->
  <svg class="wave-svg wave-svg-top" viewBox="0 0 1400 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="wg1" cx="85%" cy="35%" r="75%">
        <stop offset="0%"   stop-color="#FBBA76" stop-opacity="0.85"/>
        <stop offset="40%"  stop-color="#FDC481" stop-opacity="0.50"/>
        <stop offset="100%" stop-color="#FDC481" stop-opacity="0"/>
      </radialGradient>

  </svg>

      <linearGradient id="wg2" x1="0%" y1="100%" x2="100%" y2="0%">

  <nav class="top-nav">
    <a href="#" class="flowli-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 30 Q25 15 40 30 Q55 45 70 30" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M10 45 Q25 30 40 45 Q55 60 70 45" stroke="#2A2A2A" stroke-width="6" fill="none" stroke-linecap="round"/>

      <span class="logo-text"><span class="logo-flow">flow</span><span class="logo-li">li</span></span>

    <span class="nav-step-label" id="navStepLabel">חלק <span id="navStepNum">1</span> מתוך 4</span>
  </nav>

  <main class="page-wrap">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-block-name" id="progressBlockName"></span>
        <span class="progress-counter" id="progressCounter"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>
    </div>

    <div id="quizContent"></div>

    <div class="quiz-nav">
      <button class="btn-back" id="btnBack" onclick="prevBlock()">חזרה</button>
      <button class="btn-next" id="btnNext" onclick="nextBlock()">
        <span id="btnNextLabel">המשך</span>
        <span class="btn-arrow">←</span>
      </button>
    </div>
  </main>

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const block = blocks[currentBlock];
  const total = blocks.length;
  const pct   = Math.round((currentBlock / total) * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressBlockName').textContent = block.eyebrow;
  document.getElementById('progressCounter').textContent   = `${currentBlock + 1} / ${total}`;
  document.getElementById('navStepNum').textContent        = currentBlock + 1;
  document.getElementById('btnBack').disabled              = currentBlock === 0;

  const isLast = currentBlock === blocks.length - 1;
  document.getElementById('btnNextLabel').textContent = isLast ? 'לאבחון שלי' : 'המשך';

  // build HTML - eyebrow כבר מוצג בפס, לא מציגים שוב בcontect
  let html = `
    <div class="block-header">
      ${block.title ? `<div class="block-title">${block.title}</div>` : ''}
      ${block.sub ? `<div class="block-sub">${block.sub}</div>` : ''}
    </div>
  `;
  block.questions.forEach((q, qi) => {
    if (qi > 0) html += '<hr class="section-divider">';
    html += renderQuestion(q);
  });

  document.getElementById('quizContent').innerHTML = html;

  // restore
  block.questions.forEach(q => restoreAnswer(q));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion(q) {
  if (q.type === 'single') {
    // use single-col if 5+ options
    const gridClass = q.singleCol ? 'options-list single-col' : 'options-list';
    return `
      <div class="question-wrap" id="qwrap_${q.id}">
        <div class="q-label">${q.label.replace(/\n/g,'<br>')}</div>
        <div class="${gridClass}">
          ${q.options.map((opt,i) => `
            <div class="opt-card ${opt.lvl||'lvl-neutral'}" data-qid="${q.id}" data-idx="${i}" onclick="selectSingle(this,'${q.id}',${i})">
              <div class="opt-radio"><div class="opt-radio-dot"></div></div>
              <div class="opt-icon">${svgIcon(opt.icon)}</div>
              <div class="opt-text">
                <div class="opt-title">${opt.title}</div>
                ${opt.desc ? `<div class="opt-desc">${opt.desc}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }
  if (q.type === 'multi') {
    return `
      <div class="question-wrap" id="qwrap_${q.id}">
        <div class="q-label">${q.label}</div>
        <div class="chips-wrap">
          ${q.options.map((opt,i) => `
            <div class="chip" data-qid="${q.id}" data-idx="${i}" onclick="toggleChip(this,'${q.id}',${i})">
              <div class="chip-icon">${svgIcon(opt.icon)}</div>
              <span>${opt.title}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }
  if (q.type === 'text') {
    return `
      <div class="question-wrap" id="qwrap_${q.id}">
        <div class="q-label">${q.label}</div>
        <textarea class="quiz-textarea" id="ta_${q.id}" style="min-height:70px;"
          placeholder="${(q.placeholder||'').replace(/\n/g,'&#10;')}"
          oninput="answers['${q.id}']=this.value" rows="3"></textarea>
        <div class="textarea-helper">אופציונלי</div>
      </div>`;
  }
  if (q.type === 'textarea') {
    return `
      <div class="question-wrap" id="qwrap_${q.id}">
        <div class="q-label">${q.label}</div>
        <textarea class="quiz-textarea" id="ta_${q.id}"
          placeholder="${q.placeholder||''}"
          oninput="answers['${q.id}']=this.value" rows="4"></textarea>
        <div class="textarea-helper">אופציונלי</div>
      </div>`;
  }
  return '';
}

function restoreAnswer(q) {
  const val = answers[q.id];
  if (val === undefined || val === null) return;
  if (q.type === 'single') {
    document.querySelectorAll(`[data-qid="${q.id}"]`).forEach(el => {
      el.classList.toggle('selected', parseInt(el.dataset.idx) === val);
    });
  }
  if (q.type === 'multi' && Array.isArray(val)) {
    document.querySelectorAll(`[data-qid="${q.id}"]`).forEach(el => {
      el.classList.toggle('selected', val.includes(parseInt(el.dataset.idx)));
    });
  }
  if (q.type === 'text') {
    const el = document.getElementById(`ta_${q.id}`);
    if (el) el.value = val;
  }
  if (q.type === 'textarea') {
    const el = document.getElementById(`ta_${q.id}`);
    if (el) el.value = val;
  }
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
function selectSingle(el, qid, idx) {
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  answers[qid] = idx;
}

function toggleChip(el, qid, idx) {
  if (!answers[qid]) answers[qid] = [];
  const i = answers[qid].indexOf(idx);
  if (i === -1) { answers[qid].push(idx); el.classList.add('selected'); }
  else          { answers[qid].splice(i,1); el.classList.remove('selected'); }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function blockComplete() {
  const block = blocks[currentBlock];
  for (const q of block.questions) {
    if (!q.required) continue;
    if (answers[q.id] === undefined) return false;
  }
  return true;
}

function nextBlock() {
  if (!blockComplete()) {
    // find and highlight first unanswered required question
    const block = blocks[currentBlock];
    for (const q of block.questions) {
      if (!q.required) continue;
      if (answers[q.id] === undefined) {
        const wrap = document.getElementById(`qwrap_${q.id}`);
        if (wrap) {
          wrap.style.transition = 'outline 0.2s';
          wrap.style.outline = '2px solid rgba(242,107,31,.6)';
          wrap.style.borderRadius = '14px';
          wrap.style.padding = '8px';
          setTimeout(() => {
            wrap.style.outline = '';
            wrap.style.padding = '';
          }, 2200);
          wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        // show toast
        showToast('נא לענות על כל השאלות המסומנות');
        return;
      }
    }
    return;
  }

  if (currentBlock < blocks.length - 1) {
    currentBlock++;
    render();
  } else {
    submitQuiz();
  }
}

function prevBlock() {
  if (currentBlock > 0) { currentBlock--; render(); }
}

// ─── SCORING ─────────────────────────────────────────────────────────────────
function calcScores() {
  const s = { LEADS: 0, OPS: 0, CONTROL: 0, FLOW: 0 };
  blocks.forEach(block => {
    block.questions.forEach(q => {
      if (!q.metrics || !Object.keys(q.metrics).length) return;
      if (q.type === 'single' && answers[q.id] !== undefined) {
        const idx = answers[q.id];
        Object.entries(q.metrics).forEach(([metric, vals]) => {
          if (vals[idx] !== undefined) s[metric] += vals[idx];
        });
      }
    });
  });
  return s;
}

function maxScores() {
  const m = { LEADS: 0, OPS: 0, CONTROL: 0, FLOW: 0 };
  blocks.forEach(block => (block.questions||[]).forEach(q => {
    if (!q.metrics) return;
    Object.entries(q.metrics).forEach(([metric, vals]) => {
      if (Array.isArray(vals) && vals.length) m[metric] += Math.max(...vals);
    });
  }));
  return m;
}
function worstArea(s) {
  const m = maxScores();
  return Object.keys(s).sort((a,b) => (s[b]/(m[b]||1)) - (s[a]/(m[a]||1)))[0];
}

async function submitQuiz() {
  const s     = calcScores();
  const worst = worstArea(s);
  const tools = toolMap[worst];

  const userData = JSON.parse(localStorage.getItem('flowli_user') || '{}');

  const payload = {
    email:         userData.email  || '',
    name:          userData.name   || '',
    phone:         userData.phone  || '',
    answers:       answers,
    score:         s.LEADS + s.OPS + s.CONTROL + s.FLOW,
    worst_area:    worst,
    leads_score:   s.LEADS,
    ops_score:     s.OPS,
    control_score: s.CONTROL,
    flow_score:    s.FLOW,
    tool1:         tools.tool1,
    tool2:         tools.tool2,
    completed_at:  new Date().toISOString(),
    sent_email:    0,
  };

  localStorage.setItem('flowli_diagnose', JSON.stringify(payload));

  try {
    if (payload.email) {
      await fetch(`${SUPABASE_URL}/rest/v1/leads?on_conflict=email`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates',
        },
        body: JSON.stringify(payload)
      });
    }
  } catch(e) {
    console.warn('Supabase save failed:', e);
  }

  window.location.href = 'flowli-diagnose-loading.html';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('quiz-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'quiz-toast';
    t.style.cssText = `
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px);
      background:#1A1A1A; color:#fff; font-family:'Assistant',sans-serif;
      font-size:14px; font-weight:600; padding:11px 22px; border-radius:12px;
      opacity:0; transition:all .25s; z-index:999; white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,.25);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(10px)';
  }, 2200);
}
