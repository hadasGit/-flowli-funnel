<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowli — דשבורד פניות</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F6F1E6;
  --card: #FDFAF5;
  --ink: #1A1A1A;
  --muted: #8A8378;
  --orange: #F26B1F;
  --orange-pale: #FEF0E7;
  --orange-mid: #FDDDBD;
  --border: #DDD5C0;
  --green: #25d366;
  --blue: #4e7ef7;
  --purple: #9b59b6;
  --red: #e74c3c;
  --amber: #f7944e;
}
body {
  font-family: 'Assistant', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP BAR ── */
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-size: 19px;
  font-weight: 800;
  color: var(--orange);
  letter-spacing: -0.5px;
}
.logo span { color: var(--ink); }
.topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
}
.topbar-sep { color: var(--border); }
.topbar-right { margin-right: auto; display: flex; align-items: center; gap: 10px; }
.refresh-btn {
  background: var(--orange-pale);
  border: 1px solid var(--orange-mid);
  color: var(--orange);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
}
.refresh-btn:hover { background: var(--orange-mid); }
.last-updated { font-size: 11px; color: var(--muted); }

/* ── STATS ROW ── */
.stats-row {
  display: flex;
  gap: 14px;
  padding: 20px 28px 0;
  flex-wrap: wrap;
}
.stat-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  min-width: 140px;
  flex: 1;
}
.stat-card .label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.stat-card .value { font-size: 26px; font-weight: 800; color: var(--ink); }
.stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 10px;
  padding: 16px 28px 10px;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
}
.search-wrap input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px 7px 32px;
  font-family: inherit;
  font-size: 13px;
  background: #fff;
  outline: none;
}
.search-wrap input:focus { border-color: var(--orange); }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}
.filter-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  font-family: inherit;
  font-size: 13px;
  background: #fff;
  cursor: pointer;
  outline: none;
  color: var(--ink);
}
.filter-select:focus { border-color: var(--orange); }
.results-count { font-size: 12px; color: var(--muted); margin-right: auto; }

/* ── TABLE ── */
.table-wrap {
  margin: 0 28px 28px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead tr { background: #FAF6EF; border-bottom: 1px solid var(--border); }
th {
  padding: 11px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--orange); }
th .sort-icon { margin-right: 4px; opacity: .4; font-size: 10px; }
th.sorted .sort-icon { opacity: 1; color: var(--orange); }
tbody tr {
  border-bottom: 1px solid #F3EDE0;
  cursor: pointer;
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #FEF8F0; }
tbody tr.selected { background: #FEF0E7; }
td {
  padding: 11px 14px;
  font-size: 13px;
  vertical-align: middle;
}
td.name { font-weight: 700; }
td.email { color: var(--muted); font-size: 12px; }
td.date { color: var(--muted); font-size: 12px; white-space: nowrap; }
td.score { font-weight: 700; font-size: 15px; }
.score-hi { color: #e74c3c; }
.score-mid { color: #f7944e; }
.score-lo { color: #2D7A3A; }

/* rec badge */
.rec-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.rec-wa    { background: #e8faf0; color: #1a7a3a; }
.rec-crm   { background: #eef4ff; color: #2a5cd4; }
.rec-quotes { background: #fff4eb; color: #b85c10; }
.rec-faq   { background: #f5ebff; color: #6a2fa0; }
.rec-bundle { background: #fff0f0; color: #b02020; }
.rec-none  { background: #f5f5f5; color: #888; }

/* callback badge */
.cb-yes { color: #1a7a3a; font-weight: 700; font-size: 12px; }
.cb-no  { color: #ccc; font-size: 12px; }

.empty-state {
  text-align: center;
  padding: 48px;
  color: var(--muted);
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }

/* ── SIDE PANEL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  z-index: 200;
}
.overlay.open { display: block; }
.side-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 420px;
  max-width: 100vw;
  height: 100vh;
  background: #fff;
  border-right: 1px solid var(--border);
  z-index: 201;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  padding-bottom: 40px;
}
.side-panel.open { transform: translateX(0); }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
}
.panel-name { font-size: 17px; font-weight: 800; }
.panel-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--muted);
  padding: 2px 6px;
  border-radius: 6px;
}
.panel-close:hover { background: #f5f5f5; color: var(--ink); }

.panel-body { padding: 18px 20px; }

.panel-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.meta-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #FAF6EF;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--ink);
}
.meta-chip .icon { font-size: 14px; }

.panel-section { margin-bottom: 20px; }
.panel-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #f0ebe3;
}

/* Q&A rows */
.qa-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.qa-q {
  flex: 0 0 130px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  padding-top: 1px;
}
.qa-a {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.qa-a.bad { color: #c0392b; }
.qa-a.ok  { color: #2D7A3A; }

/* recommendation box */
.rec-box {
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 18px;
}
.rec-box.wa     { background: #e8faf0; border: 1.5px solid #b2dfcc; }
.rec-box.crm    { background: #eef4ff; border: 1.5px solid #b0c8f7; }
.rec-box.quotes { background: #fff4eb; border: 1.5px solid #f7c89e; }
.rec-box.faq    { background: #f5ebff; border: 1.5px solid #d3b0ef; }
.rec-box.bundle { background: #fff0f0; border: 1.5px solid #f7b0b0; }
.rec-box.none   { background: #f5f5f5; border: 1.5px solid #ddd; }
.rec-box-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
.rec-box-name  { font-size: 15px; font-weight: 800; }

/* pain bubble */
.pain-bubble {
  background: var(--orange-pale);
  border: 1px solid var(--orange-mid);
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 13px;
  font-style: italic;
  color: #6B3A1A;
  margin-bottom: 16px;
}

/* score circle */
.score-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 18px;
  font-weight: 800;
  margin-left: 8px;
  flex-shrink: 0;
}
.score-circle.hi  { background: #fde8e8; color: #c0392b; }
.score-circle.mid { background: #fff4eb; color: #b85c10; }
.score-circle.lo  { background: #e8faf0; color: #1a7a3a; }

/* roi box */
.roi-box {
  background: #FAF6EF;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.roi-num { font-size: 22px; font-weight: 800; color: var(--orange); }
.roi-label { font-size: 12px; color: var(--muted); }

/* loading */
.loading-wrap { display: flex; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--muted); font-size: 14px; }
.spinner { width: 22px; height: 22px; border: 3px solid var(--orange-mid); border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* error */
.error-box {
  margin: 20px 28px;
  background: #fff0f0;
  border: 1px solid #f7b0b0;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 13px;
  color: #c0392b;
}

@media (max-width: 640px) {
  .stats-row, .filters { padding: 12px 14px 0; }
  .table-wrap { margin: 0 14px 20px; }
  .topbar { padding: 0 14px; }
  .side-panel { width: 100vw; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">flow<span>li</span></div>
  <div class="topbar-sep">|</div>
  <div class="topbar-title">דשבורד פניות</div>
  <div class="topbar-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadLeads()">
      <span>↻</span> רענן
    </button>
  </div>
</div>

<!-- STATS -->
<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="label">סה"כ פניות</div><div class="value" id="statTotal">—</div></div>
  <div class="stat-card"><div class="label">ביקשו חזרה</div><div class="value" id="statCallback">—</div></div>
  <div class="stat-card"><div class="label">ציון ממוצע</div><div class="value" id="statAvgScore">—</div><div class="sub">מתוך 100</div></div>
  <div class="stat-card"><div class="label">ROI ממוצע</div><div class="value" id="statAvgRoi">—</div><div class="sub">₪/חודש פוטנציאל</div></div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="חפשי לפי שם, מייל..." oninput="applyFilters()">
  </div>
  <select class="filter-select" id="filterRec" onchange="applyFilters()">
    <option value="">כל ההמלצות</option>
    <option value="whatsapp">🟢 WhatsApp</option>
    <option value="crm">🔵 CRM</option>
    <option value="quotes">🟠 הצעות מחיר</option>
    <option value="faq">🟣 FAQ</option>
    <option value="bundle">🔴 Bundle</option>
  </select>
  <select class="filter-select" id="filterCallback" onchange="applyFilters()">
    <option value="">כולם</option>
    <option value="yes">ביקשו חזרה ✓</option>
    <option value="no">לא ביקשו</option>
  </select>
  <select class="filter-select" id="sortBy" onchange="applyFilters()">
    <option value="date_desc">תאריך — חדש ראשון</option>
    <option value="date_asc">תאריך — ישן ראשון</option>
    <option value="score_desc">ציון — גבוה ראשון</option>
    <option value="score_asc">ציון — נמוך ראשון</option>
  </select>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div> טוענת פניות...
  </div>
  <div id="errorBox" class="error-box" style="display:none"></div>
  <table id="leadsTable" style="display:none">
    <thead>
      <tr>
        <th data-col="name">שם <span class="sort-icon">↕</span></th>
        <th data-col="email">מייל</th>
        <th data-col="phone">טלפון</th>
        <th data-col="date">תאריך <span class="sort-icon">↕</span></th>
        <th data-col="score">ציון <span class="sort-icon">↕</span></th>
        <th data-col="rec">המלצה</th>
        <th data-col="roi">ROI</th>
        <th data-col="callback">חזרה</th>
        <th data-col="meeting">פגישה</th>
        <th data-col="source">מקור</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">📭</div>
    <div>לא נמצאו פניות התואמות את הסינון</div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- SIDE PANEL -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div class="panel-name" id="panelName"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://whuuevjoqitwslnykvgd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXVldmpvcWl0d3NsbnlrdmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTk3NDQsImV4cCI6MjA5NDY5NTc0NH0.r_lxvPFY275H7ODxYGHs0-NvqfQd8_e3fKHYy4sgq34';

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
let allLeads = [];
let filteredLeads = [];
let selectedId = null;

async function loadLeads() {
  document.getElementById('loadingWrap').style.display = 'flex';
  document.getElementById('leadsTable').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.desc&limit=500`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allLeads = await res.json();
    document.getElementById('lastUpdated').textContent =
      'עודכן: ' + new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
    applyFilters();
  } catch(e) {
    document.getElementById('loadingWrap').style.display = 'none';
    const eb = document.getElementById('errorBox');
    eb.style.display = 'block';
    eb.textContent = 'שגיאה בטעינת נתונים: ' + e.message;
  }
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════

// מיפוי worst_area בעברי → סוג המלצה
const WORST_AREA_MAP = {
  'זמן תגובה':    'whatsapp',
  'ניהול פניות':  'crm',
  'הצעות מחיר':   'quotes',
  'מידע':         'faq',
  'שאלות':        'faq',
  'תפעול משרד':   'bundle',
  'עומס יומי':    'bundle',
};

function buildRec(lead) {
  const a = lead.answers || {};
  const ls = a.leadSources || [];
  const usesWA = ls.includes(0) || ls.includes('0');

  const rt  = (a.responseTime !== undefined && a.responseTime !== 4 && a.responseTime !== '4') ? +a.responseTime : -1;
  const fu  = (a.followup     !== undefined) ? +a.followup  : -1;
  const ld  = (a.leads        !== undefined) ? +a.leads     : -1;
  const qu  = (a.quotes !== undefined && a.quotes !== 4 && a.quotes !== '4') ? +a.quotes  : -1;
  const inf = (a.info         !== undefined) ? +a.info      : -1;
  const qst = (a.questions !== undefined && a.questions !== 4 && a.questions !== '4') ? +a.questions : -1;

  const scores = {
    whatsapp: usesWA ? (rt>=0?rt*1.5:0) + (ld>=1?ld*0.3:0) : 0,
    crm:      (fu>=0?fu*2:0) + (ld>=1?ld*0.4:0) + (inf>=1?inf*0.4:0),
    quotes:   qu>=0 ? qu*2 : 0,
    faq:      qst>=0 ? qst*1.5 + (inf>=1?inf*0.5:0) : 0,
  };

  const high   = Object.entries(scores).filter(([,s])=>s>=3);
  const sorted = Object.entries(scores).filter(([,s])=>s>0).sort(([,a],[,b])=>b-a);

  if (high.length >= 2 && sorted.length && sorted[0][1] >= 3) return 'bundle';
  if (sorted.length) return sorted[0][0];

  // fallback: worst_area מ-Supabase (נשמר בעברי)
  if (lead.worst_area) {
    return WORST_AREA_MAP[lead.worst_area] || 'bundle';
  }
  return 'bundle';
}

// ─── מחזיר את הכלי השני בחשיבות ──────────────────────
function buildRec2(lead) {
  const a = lead.answers || {};
  const ls = a.leadSources || [];
  const usesWA = ls.includes(0) || ls.includes('0');
  const rt  = (a.responseTime !== undefined && a.responseTime !== 4 && a.responseTime !== '4') ? +a.responseTime : -1;
  const fu  = (a.followup  !== undefined) ? +a.followup  : -1;
  const ld  = (a.leads     !== undefined) ? +a.leads     : -1;
  const qu  = (a.quotes !== undefined && a.quotes !== 4 && a.quotes !== '4') ? +a.quotes : -1;
  const inf = (a.info      !== undefined) ? +a.info      : -1;
  const qst = (a.questions !== undefined && a.questions !== 4 && a.questions !== '4') ? +a.questions : -1;

  const scores = {
    whatsapp: usesWA ? (rt>=0?rt*1.5:0) + (ld>=1?ld*0.3:0) : 0,
    crm:      (fu>=0?fu*2:0) + (ld>=1?ld*0.4:0) + (inf>=1?inf*0.4:0),
    quotes:   qu>=0 ? qu*2 : 0,
    faq:      qst>=0 ? qst*1.5 + (inf>=1?inf*0.5:0) : 0,
  };
  const primary = lead._rec || buildRec(lead);
  const sorted = Object.entries(scores)
    .filter(([k,s]) => s > 0 && k !== primary)
    .sort(([,a],[,b]) => b - a);
  return sorted.length ? sorted[0][0] : null;
}

// ─── בונה את ה-insight המלא שהלקוח ראה ─────────────────
function buildInsight(lead) {
  const a = lead.answers || {};
  const type = lead._rec || buildRec(lead);

  const firstName = (lead.name || '').split(' ')[0] || 'לקוח';
  const industryLabels = ['שירותים','מסחר ומוצרים','B2B','אירועים'];
  const industryLabel  = industryLabels[+(a.industry ?? 0)];
  const leadsMonthly   = [7,20,50,100][+(a.monthlyLeads ?? 1)];
  const dealValues     = [250,1200,5500,15000][+(a.dealsize ?? 2)];
  const closeRates     = [0.75,0.50,0.25,0.12][+(a.closeRate ?? 2)];
  const leadsLost      = Math.round(leadsMonthly * (1 - closeRates));
  const moneyLost      = Math.round(leadsLost * dealValues * Math.min(closeRates * 1.35, 0.85));
  const rtLabels       = ['תוך 5 דקות','תוך שעה-שעתיים','אותו יום','יום או יותר'];
  const rtLabel        = (a.responseTime >= 0 && a.responseTime <= 3) ? rtLabels[+a.responseTime] : 'זמן ארוך';
  const highDeal       = (+(a.dealsize ?? 0)) >= 2;

  const map = {
    whatsapp: {
      title: `${firstName}, פנייה שלא ענית עליה ${rtLabel} — כבר אצל המתחרה`,
      body:  `ב${industryLabel}, לקוח שלא מקבל מענה תוך שעה — עובר הלאה. שיעור הסגירה יורד ב-70% עם כל שעה שעוברת. עם ${leadsMonthly} פניות בחודש, זה מספרים גדולים.`,
      step:  `שלב 1: תגובה אוטומטית שמאשרת קבלת פנייה תוך 30 שניות`,
      tool:  `🤖 בוט WhatsApp אוטומטי`,
      impact:`מונע ~${Math.round(moneyLost*0.35).toLocaleString()}₪ אובדן חודשי`,
    },
    crm: {
      title: `${leadsLost} פניות יוצאות מהמשפך שלך כל חודש — בלי מעקב`,
      body:  `ב${industryLabel} הלקוח מצפה לחזרה. בלי מעקב מסודר — כל פנייה שנשכחת שווה ${dealValues.toLocaleString()}₪ שנשאר על השולחן.`,
      step:  `שלב 1: רשימה חיה של כל הפניות הפתוחות עם סטטוס ותאריך`,
      tool:  highDeal ? `📋 CRM אוטומטי עם תזכורות` : `📋 מעקב פניות אוטומטי`,
      impact:`שחזור עד ${moneyLost.toLocaleString()}₪ בחודש`,
    },
    quotes: {
      title: `הצעת מחיר שמאחרת = עסקת ${dealValues.toLocaleString()}₪ אצל המתחרה`,
      body:  `ב${industryLabel}, מי שמחזיר הצעה ראשון — סוגר. 3 דקות במקום שעות זה לא חלום, זה אוטומציה פשוטה.`,
      step:  `שלב 1: תבנית הצעת מחיר שמתמלאת אוטומטית בנתוני הלקוח`,
      tool:  `📄 הצעות מחיר אוטומטיות`,
      impact:`חוסך 5–8 שעות שבועיות`,
    },
    faq: {
      title: `חצי יום עונה על אותן שאלות — ב${industryLabel} זה נפוץ, אבל לא חייב`,
      body:  `שאלות על מחיר, זמינות, סטטוס — 80% מהשאלות חוזרות. בוט שעונה אוטומטית משחרר אותך לעבוד על מה שחשוב.`,
      step:  `שלב 1: רשימת השאלות הנפוצות ותשובות אוטומטיות`,
      tool:  `💬 בוט FAQ ומידע ללקוחות`,
      impact:`3–5 שעות פנויות ביום`,
    },
    bundle: {
      title: `${firstName}, כל האנרגיה שלך הולכת לכיבוי שריפות`,
      body:  `עם ${leadsMonthly} פניות בחודש ועסקאות של ${dealValues.toLocaleString()}₪ ב${industryLabel} — כל דקה שהולכת לשגרה ידנית היא דקה שלא הולכת לצמיחה.`,
      step:  `שלב 1: לזהות את 3 המשימות החוזרות ביותר ולהפוך אותן לאוטומטיות`,
      tool:  `⚡ חבילת אוטומציה מותאמת אישית`,
      impact:`8–10 שעות פנויות בשבוע`,
    },
  };
  return map[type] || map.bundle;
}

function recLabel(type) {
  const map = {
    whatsapp: {label:'בוט WhatsApp', cls:'rec-wa', icon:'🟢'},
    crm:      {label:'CRM',          cls:'rec-crm', icon:'🔵'},
    quotes:   {label:'הצעות מחיר',   cls:'rec-quotes', icon:'🟠'},
    faq:      {label:'FAQ Bot',      cls:'rec-faq', icon:'🟣'},
    bundle:   {label:'חבילה',        cls:'rec-bundle', icon:'🔴'},
  };
  return map[type] || {label: type||'—', cls:'rec-none', icon:'⚪'};
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL', {day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' +
         d.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
}

function fmtScore(s) {
  if (s === null || s === undefined || s === '') return {text:'—', cls:''};
  const n = +s;
  if (isNaN(n)) return {text:'—', cls:''};
  // score מ-Supabase: סכום ניקוד (בד"כ 0-30). גבוה = יותר בעיות
  if (n >= 15) return {text: n, cls: 'score-hi'};
  if (n >= 7)  return {text: n, cls: 'score-mid'};
  return {text: n, cls: 'score-lo'};
}

function fmtRoi(r) {
  if (!r) return '—';
  const n = +r;
  if (n >= 10000) return (n/1000).toFixed(0) + 'K₪';
  return n.toLocaleString('he-IL') + '₪';
}

// ═══════════════════════════════════════════
// FILTER + RENDER TABLE
// ═══════════════════════════════════════════

function applyFilters() {
  const q     = document.getElementById('searchInput').value.trim().toLowerCase();
  const fRec  = document.getElementById('filterRec').value;
  const fCb   = document.getElementById('filterCallback').value;
  const sort  = document.getElementById('sortBy').value;

  let data = allLeads.map(lead => ({
    ...lead,
    _rec: buildRec(lead)
  }));

  if (q) {
    data = data.filter(l =>
      (l.name||'').toLowerCase().includes(q) ||
      (l.email||'').toLowerCase().includes(q) ||
      (l.phone||'').includes(q)
    );
  }
  if (fRec) {
    data = data.filter(l => l._rec === fRec);
  }
  if (fCb === 'yes') data = data.filter(l => l.callback_requested);
  if (fCb === 'no')  data = data.filter(l => !l.callback_requested);

  // sort
  data.sort((a,b) => {
    if (sort === 'date_desc') return new Date(b.created_at||0) - new Date(a.created_at||0);
    if (sort === 'date_asc')  return new Date(a.created_at||0) - new Date(b.created_at||0);
    if (sort === 'score_desc') return (+b.score||0) - (+a.score||0);
    if (sort === 'score_asc')  return (+a.score||0) - (+b.score||0);
    return 0;
  });

  filteredLeads = data;

  // stats (always from all)
  const totalCount = allLeads.length;
  const cbCount = allLeads.filter(l=>l.callback_requested).length;
  const scores = allLeads.map(l=>+l.score).filter(n=>!isNaN(n)&&n>0);
  const avgScore = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  const rois = allLeads.map(l=>+l.roi_estimate).filter(n=>!isNaN(n)&&n>0);
  const avgRoi = rois.length ? Math.round(rois.reduce((a,b)=>a+b,0)/rois.length) : null;
  document.getElementById('statTotal').textContent    = totalCount;
  document.getElementById('statCallback').textContent = cbCount;
  document.getElementById('statAvgScore').textContent = avgScore !== null ? avgScore : '—';
  document.getElementById('statAvgRoi').textContent   = avgRoi !== null ? fmtRoi(avgRoi) : '—';

  document.getElementById('resultsCount').textContent =
    data.length === allLeads.length
      ? `${data.length} פניות`
      : `מציג ${data.length} מתוך ${allLeads.length}`;

  renderTable(data);
}

function renderTable(data) {
  document.getElementById('loadingWrap').style.display = 'none';

  if (!data.length) {
    document.getElementById('leadsTable').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('leadsTable').style.display = 'table';

  const tbody = document.getElementById('tableBody');
  const sc = fmtScore;
  tbody.innerHTML = data.map(lead => {
    const rec = recLabel(lead._rec);
    const s = sc(lead.score);
    const isSelected = lead.id === selectedId;
    const safeId = lead.id.replace(/"/g, '&quot;');
    return `<tr onclick="openPanel('${safeId}')" class="${isSelected?'selected':''}">
      <td class="name">${lead.name || '—'}</td>
      <td class="email">${lead.email || '—'}</td>
      <td>${lead.phone || '—'}</td>
      <td class="date">${fmtDate(lead.created_at)}</td>
      <td class="score ${s.cls}">${s.text}</td>
      <td><span class="rec-badge ${rec.cls}">${rec.icon} ${rec.label}</span></td>
      <td>${fmtRoi(lead.roi_estimate)}</td>
      <td>${lead.callback_requested ? '<span class="cb-yes">✓ כן</span>' : '<span class="cb-no">—</span>'}</td>
      <td>${lead.meeting_requested ? '<span class="cb-yes">📅 כן</span>' : '<span class="cb-no">—</span>'}</td>
      <td>${lead.source === 'email' ? '<span style="background:#FEF0E7;color:#D45A12;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid rgba(242,107,31,.3);">📧 מייל</span>' : '<span style="color:#8A8378;font-size:12px;">אורגני</span>'}</td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════════

const Q_LABELS = {
  mood:         {label:'מצב כללי',      answers:['מצוין','בסדר','קשה','בכאוס']},
  industry:     {label:'ענף',           answers:['שירותים','מסחר','B2B','אירועים']},
  dealsize:     {label:'גודל עסקה',     answers:['עד 500₪','500-2K₪','2K-10K₪','מעל 10K₪']},
  monthlyLeads: {label:'פניות בחודש',   answers:['1-5','6-20','21-50','50+']},
  closeRate:    {label:'אחוז סגירה',    answers:['מעל 60%','30-60%','10-30%','מתחת 10%']},
  responseTime: {label:'זמן תגובה',     answers:['תוך 5 דק','תוך שעה','אותו יום','לא מגיב'],  bad:[2,3]},
  leads:        {label:'ניהול ליד',     answers:['מסודר','בסדר','מבולגן','הולכים לאיבוד'],     bad:[2,3]},
  followup:     {label:'פולואפ',        answers:['תמיד','לפעמים','לא','בכלל לא'],               bad:[2,3]},
  quotes:       {label:'הצעות מחיר',   answers:['מהיר','לוקח זמן','הרבה שאלות','מפסיד ל-ות','לא רלוונטי']},
  info:         {label:'שליחת מידע',   answers:['לא שולח','לפעמים','כן','הרבה']},
  questions:    {label:'שאלות חוזרות', answers:['כמעט אין','מעט','הרבה','תמיד חוזרות','לא רלוונטי']},
};

const LS_LABELS = ['וואטסאפ','טלפון','אתר','אינסטגרם','המלצות','מודעות'];

function openPanel(id) {
  // חפש קודם ב-filteredLeads (יש _rec), אחרת חשב מחדש
  let lead = filteredLeads.find(l => l.id === id);
  if (!lead) {
    const raw = allLeads.find(l => l.id === id);
    if (!raw) return;
    lead = { ...raw, _rec: buildRec(raw) };
  }
  if (!lead) return;
  selectedId = id;

  // highlight row
  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
  document.querySelectorAll('tbody tr').forEach(tr => {
    if (tr.getAttribute('onclick') && tr.getAttribute('onclick').includes(id)) tr.classList.add('selected');
  });

  const rec     = recLabel(lead._rec || buildRec(lead));
  const insight = buildInsight(lead);
  const a       = lead.answers || {};
  const s   = fmtScore(lead.score);

  const scoreCircleCls = s.cls === 'score-hi' ? 'hi' : s.cls === 'score-mid' ? 'mid' : 'lo';

  // leadSources
  const lsArr = a.leadSources || [];
  const lsText = lsArr.length
    ? lsArr.map(i => LS_LABELS[+i] || i).join(', ')
    : '—';

  // build Q&A html
  let qaHtml = '';
  for (const [key, meta] of Object.entries(Q_LABELS)) {
    const val = a[key];
    if (val === undefined || val === null) continue;
    const idx = +val;
    const ansText = meta.answers[idx] ?? val;
    const isBad = meta.bad && meta.bad.includes(idx);
    qaHtml += `<div class="qa-row">
      <div class="qa-q">${meta.label}</div>
      <div class="qa-a ${isBad?'bad':''}">${ansText}</div>
    </div>`;
  }
  // leadSources row
  qaHtml += `<div class="qa-row">
    <div class="qa-q">ערוצי פנייה</div>
    <div class="qa-a">${lsText}</div>
  </div>`;

  // pain point
  const painHtml = (a.painPoint && a.painPoint.trim().length > 2)
    ? `<div class="panel-section">
        <div class="panel-section-title">כאב עיקרי בכתב חופשי</div>
        <div class="pain-bubble">"${a.painPoint}"</div>
       </div>`
    : '';

  // roi
  const roiHtml = lead.roi_estimate
    ? `<div class="roi-box">
        <div class="score-circle ${scoreCircleCls}">${s.text}</div>
        <div>
          <div class="roi-label">ציון אבחון</div>
        </div>
        <div style="margin-right:auto">
          <div class="roi-num">${fmtRoi(lead.roi_estimate)}</div>
          <div class="roi-label">ROI פוטנציאל / חודש</div>
        </div>
       </div>`
    : `<div class="roi-box">
        <div class="score-circle ${scoreCircleCls}">${s.text}</div>
        <div><div class="roi-label">ציון אבחון</div></div>
       </div>`;

  document.getElementById('panelName').textContent = lead.name || 'ללא שם';

  document.getElementById('panelBody').innerHTML = `
    <!-- meta chips -->
    <div class="panel-meta">
      ${lead.email ? `<div class="meta-chip"><span class="icon">✉️</span>${lead.email}</div>` : ''}
      ${lead.phone ? `<div class="meta-chip"><span class="icon">📞</span>${lead.phone}</div>` : ''}
      <div class="meta-chip"><span class="icon">📅</span>${fmtDate(lead.created_at)}</div>
      ${lead.visit_count > 1 ? `<div class="meta-chip"><span class="icon">🔄</span>${lead.visit_count} ביקורים</div>` : ''}
      ${lead.callback_requested ? `<div class="meta-chip" style="background:#e8faf0;border-color:#b2dfcc;color:#1a7a3a"><span class="icon">✅</span>ביקשה חזרה</div>` : ''}
    </div>

    <!-- recommendation -->
    <div class="panel-section">
      <div class="panel-section-title">המלצה שהלקוח קיבל</div>
      <div class="rec-box ${lead._rec||'none'}">
        <div class="rec-box-label">${insight.tool}</div>
        <div class="rec-box-name">${rec.icon} ${rec.label}</div>
        <div style="font-size:12px;color:#555;margin-top:6px;">${insight.impact}</div>
      </div>
    </div>

    <!-- insight — מה שהלקוח ראה -->
    <div class="panel-section">
      <div class="panel-section-title">מה שהלקוח ראה בדף התוצאות</div>

      <!-- כלי 1 -->
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">
        <span style="background:#F26B1F;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;">כלי 1</span>
        <span style="font-size:12px;font-weight:700;color:#555;">${insight.tool}</span>
      </div>
      <div style="background:#FAF6EF;border:1px solid #E8DDD0;border-radius:10px;padding:13px 14px;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:700;color:#1A1A1A;margin-bottom:6px;line-height:1.4;">${insight.title}</div>
        <div style="font-size:12px;color:#555;line-height:1.6;">${insight.body}</div>
      </div>
      <div style="background:#FEF0E7;border:1px solid #FDDDBD;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:600;color:#B85C10;margin-bottom:16px;">
        📌 ${insight.step}
      </div>

      <!-- כלי 2 -->
      ${(()=>{
        const type2 = buildRec2(lead);
        if (!type2) return '';
        const i2 = buildInsight({...lead, _rec: type2});
        const r2 = recLabel(type2);
        return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">
          <span style="background:#8A8378;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;">כלי 2</span>
          <span style="font-size:12px;font-weight:700;color:#555;">${i2.tool}</span>
        </div>
        <div style="background:#F5F2EC;border:1px solid #DDD5C0;border-radius:10px;padding:13px 14px;margin-bottom:8px;">
          <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:5px;line-height:1.4;">${i2.title}</div>
          <div style="font-size:12px;color:#666;line-height:1.5;">${i2.body}</div>
        </div>
        <div style="background:#F0EBE3;border:1px solid #D8D0BE;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:600;color:#6B5A48;">
          📌 ${i2.step}
        </div>`;
      })()}
    </div>

    <!-- score + roi -->
    ${roiHtml}

    <!-- pain point -->
    ${painHtml}

    <!-- Q&A -->
    <div class="panel-section">
      <div class="panel-section-title">תשובות השאלון</div>
      ${qaHtml || '<div style="color:#aaa;font-size:12px">אין תשובות שמורות</div>'}
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  selectedId = null;
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sidePanel').classList.remove('open');
  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if (!selectedId) return;
  const idx = filteredLeads.findIndex(l => l.id === selectedId);
  if (e.key === 'ArrowDown' && idx >= 0 && idx < filteredLeads.length-1) openPanel(filteredLeads[idx+1].id);
  if (e.key === 'ArrowUp'   && idx > 0)                                  openPanel(filteredLeads[idx-1].id);
});

// init
loadLeads();
</script>
</body>
</html>
